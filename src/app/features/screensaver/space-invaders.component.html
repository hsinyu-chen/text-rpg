<div class="screensaver-container">
  <div #gameContainer class="phaser-container"></div>
  <button mat-icon-button class="exit-btn" (click)="exit()" [attr.aria-label]="'screensaver.exitScreensaver' | translate">
    <mat-icon>close</mat-icon>
  </button>
  <div class="hint">{{ 'screensaver.hint' | translate }}</div>
</div>
