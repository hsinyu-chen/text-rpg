<!-- Local File System Section (KB markdown import/export) -->
<div class="sync-section">
    <div class="section-header">
        <mat-icon>computer</mat-icon>
        <span class="section-title">{{ 'sidebar.fileSync.localFileSystem' | translate }}</span>
    </div>

    <div class="folder-selection">
        @if (fileSystem.hasHandle()) {
        <div class="slot-info">
            <mat-icon class="slot-icon">folder</mat-icon>
            <span class="slot-name text-truncate-left" [matTooltip]="fileSystem.directoryHandle()?.name || ''">
                {{ fileSystem.directoryHandle()?.name }}
            </span>
            <button mat-icon-button (click)="loadFolder()" (hintActivate)="loadFolder()"
                appAgentHint="sidebar/files-tab/file-sync/change-folder"
                [matTooltip]="'sidebar.fileSync.changeFolderTooltip' | translate">
                <mat-icon>edit</mat-icon>
            </button>
        </div>
        } @else {
        <div class="slot-info fade-text">
            <span class="slot-name">{{ 'sidebar.fileSync.noFolderSelected' | translate }}</span>
            <button mat-icon-button (click)="loadFolder()" (hintActivate)="loadFolder()"
                appAgentHint="sidebar/files-tab/file-sync/select-folder"
                [matTooltip]="'sidebar.fileSync.selectFolderTooltip' | translate">
                <mat-icon>add_link</mat-icon>
            </button>
        </div>
        }
    </div>

    <div class="action-grid">
        <button mat-flat-button color="primary" (click)="loadFilesOnly()"
            [disabled]="state.isBusy() || !fileSystem.hasHandle()" class="action-btn">
            <mat-icon>folder_open</mat-icon>
            {{ 'sidebar.fileSync.loadBtn' | translate }}
        </button>
        <button mat-stroked-button color="primary" (click)="syncToDisk()"
            [disabled]="state.isBusy() || !fileSystem.hasHandle() || state.loadedFiles().size === 0" class="action-btn">
            <mat-icon>sync</mat-icon>
            {{ 'sidebar.fileSync.syncBtn' | translate }}
        </button>
    </div>
</div>
