<div class="selector-row">
  @if (profiles().length === 0) {
    <button mat-stroked-button class="create-btn" (click)="openManager()">
      <mat-icon>add</mat-icon>
      {{ 'sidebar.providerSelector.createProfileBtn' | translate }}
    </button>
  } @else {
    <mat-form-field appearance="outline" class="profile-field" subscriptSizing="dynamic">
      <mat-label>{{ 'sidebar.providerSelector.profileLabel' | translate }}</mat-label>
      <mat-select [ngModel]="activeId()"
                  (ngModelChange)="onChange($event)"
                  appAgentHint="sidebar/provider-selector"
                  [disabled]="state.isBusy()">
        @for (p of profiles(); track p.id) {
          <mat-option [value]="p.id">
            {{ p.name }} <span class="provider-tag">({{ p.provider }})</span>
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
    <button mat-icon-button
            class="configure-btn"
            [matTooltip]="'sidebar.providerSelector.manageProfilesTooltip' | translate"
            [disabled]="state.isBusy()"
            (click)="openManager()">
      <mat-icon>tune</mat-icon>
    </button>
  }
</div>
