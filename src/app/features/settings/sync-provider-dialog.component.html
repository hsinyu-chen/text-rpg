<h2 mat-dialog-title>Sync Provider</h2>
<mat-dialog-content>
    <p class="hint-text">
        Choose where Books, Collections, and the Settings snapshot sync to. The sync provider
        configuration itself is not synced (chicken-and-egg). Use Settings → Settings Sync to
        upload/download the app settings snapshot.
    </p>
    <app-sync-provider-config></app-sync-provider-config>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
