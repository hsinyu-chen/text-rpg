<h2 mat-dialog-title>{{ resolvedTitle() }}</h2>
<mat-dialog-content>
    <p class="message-content">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    @if (!data.isAlert) {
    <button mat-button [mat-dialog-close]="false">{{ resolvedCancelText() }}</button>
    }
    <button mat-flat-button color="primary" [mat-dialog-close]="true" cdkFocusInitial>{{ resolvedOkText() }}</button>
</mat-dialog-actions>
