<h2 mat-dialog-title>{{ (isExport ? 'sync.s3.json.exportTitle' : 'sync.s3.json.importTitle') | translate }}</h2>
<mat-dialog-content>
    <p class="hint">
        @if (isExport) {
            {{ 'sync.s3.json.exportHint' | translate }}
        } @else {
            {{ 'sync.s3.json.importHint' | translate }}
        }
    </p>
    <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'sync.s3.json.jsonLabel' | translate }}</mat-label>
        <textarea matInput rows="10" spellcheck="false"
            [readonly]="isExport"
            [ngModel]="text()" (ngModelChange)="text.set($event)"
            placeholder='{ "endpoint": "https://...", "bucket": "...", "accessKeyId": "...", "secretAccessKey": "...", "forcePathStyle": true }'></textarea>
    </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
    @if (isExport) {
        <button mat-button (click)="cancel()">{{ 'ui.CLOSE' | translate }}</button>
        <button mat-flat-button color="primary" (click)="copy()">
            <mat-icon>content_copy</mat-icon> {{ 'sync.common.copyBtn' | translate }}
        </button>
    } @else {
        <button mat-button (click)="cancel()">{{ 'dialog.cancel' | translate }}</button>
        <button mat-flat-button color="primary" [disabled]="!text().trim()" (click)="save()">{{ 'sync.common.saveBtn' | translate }}</button>
    }
</mat-dialog-actions>
